<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSteam Pro | The Art of Ironing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="main-view">
        <header>
            <div class="logo">AUTOSTEAM</div>
        </header>

        <div class="content">
            <h1 class="fade-in">Perfectly Pressed.<br>Automatically.</h1>
            <p class="subtitle fade-in">The ultimate garment care system. Effortless, fast, and professional.</p>
            
            <div class="product-hero">
                <img src="product.png" alt="AutoSteam Pro" class="hero-img">
            </div>

            <div class="action-zone fade-in">
                <div class="price-pill">79.99 USDT</div>
                <button class="order-btn" onclick="openPayment()">Get Yours Now</button>
            </div>
        </div>

        <div id="paymentOverlay" class="overlay">
            <div class="payment-modal">
                <button class="close-btn" onclick="closePayment()">✕</button>
                <h3>Official Checkout</h3>
                <p>Send <b>79.99 USDT</b> via <b>TRC20</b></p>
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=TVWRheHD5zVeXeF3jnWpZrVunaTGLZza3i" alt="QR">
                </div>
                <div class="wallet-field">
                    <code id="walletAddr">TVWRheHD5zVeXeF3jnWpZrVunaTGLZza3i</code>
                    <button onclick="copyWallet()">Copy</button>
                </div>
                <small>Send screenshot to: support@autosteam.pro</small>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
